
    <form id="fam_labels_table_form">
         <table class="table table-hover align-middle">
            <thead class="table-light sticky-top shadow-sm" >
            <tr>
                <th scope="col">QR</th>
                <th scope="col">Company Tag</th>
                <th scope="col">Label Code</th>
                <th scope="col">Asset</th>
                <th scope="col">Action</th>
            </tr>
            </thead>

            <tbody class="overflow-scroll">
                {% for label in fam_labels %}
                    <tr>
                        <td><img src="{{label.qr_code.url}}" alt="{{ label.company_tag }}" width="50"></td>
                        <td>{{ label.company_tag }}</td>
                        <td>{{ label.id }}<input type="hidden" name="label_id" value="{{ label.id }}" id="{{ label.id }}"> </td>
                        <td>{{ label.assetrecord|default:"No Asignado"}}</td>
                        <td>
                            {% if not label.assetrecord %}
                                <button type="button" class="btn btn-danger btn-sm rounded-3"
                                    hx-get="{% url 'fam:assign_label' label.id %}"
                                    hx-trigger="click"
                                    hx-target="#dialog">
                                    Assign Asset
                                </button>
                            {% else %}
                                <button class="btn btn-primary btn-sm rounded-3">View Asset</button>
                            {% endif %}
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </form>
