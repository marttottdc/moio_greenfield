{% load static i18n %}

<div class="row overflow-scroll" style="height: 50%">
    <table class="table table-hover">
        <thead>
        <tr>
            <th scope="col">QR</th>
            <th scope="col">Company Tag</th>
            <th scope="col">Label</th>
            <th scope="col">Asset</th>
            <th scope="col">Action</th>

        </tr>
        </thead>

        <tbody>
            {% for label in fam_labels %}
                <tr>
                    <td><img src="{{label.qr_code.url}}" alt="{{ label.company_tag }}" width="40"></td>
                    <td>{{ label.company_tag }}</td>
                    <td>{{ label.id }}</td>
                    <td>{{ label.assetrecord|default:"No Asignado"}}</td>
                    <td>
                        {% if not label.asset %}
                            <button class="btn btn-danger rounded-3">Assign Asset</button>
                        {% else %}
                            <button class="btn btn-primary rounded-3">View Asset</button>
                        {% endif %}
                    </td>

                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
