<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    @page {
      size: {{ page|default:"A4" }} {{ orient|default:"portrait" }};
      margin: {{ margin_mm|default:5 }}mm;
    }
    html, body { margin: 0; }
    .toolbar { position: fixed; top: 8px; right: 8px; }
    @media print { .toolbar { display: none; } }

    .grid {
      display: grid;
      grid-template-columns: repeat({{ cols }}, {{ cell_w_mm }}mm);
      grid-auto-rows: {{ cell_h_mm }}mm;
      gap: {{ gap_y_mm }}mm {{ gap_x_mm }}mm; /* row-gap col-gap */
      page-break-inside: avoid;
    }
    .cell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">Print</button>
  </div>
  <div class="grid">
    {% for _r in 0|make_list:rows %}
      {% for _c in 0|make_list:cols %}
        <div class="cell"><img src="data:image/png;base64,{{ img_b64 }}" alt="Label"></div>
      {% endfor %}
    {% endfor %}
  </div>
</body>
</html>
