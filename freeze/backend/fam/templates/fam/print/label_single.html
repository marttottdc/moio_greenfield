<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    @page {
      size: {{ page|default:"A4" }} {{ orient|default:"portrait" }};
      margin: 0;
    }
    @media print {
      html, body { margin: 0; }
    }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      height: 100vh;
      background: white;
    }
    .label {
      width: {{ width_mm }}mm;
      height: {{ height_mm }}mm;
      display: grid;
      place-items: center;
    }
    .label img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* image is exact size; QR quiet zone preserved */
    }
    .toolbar { position: fixed; top: 8px; right: 8px; print-color-adjust: exact; }
    @media print { .toolbar { display: none; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">Print</button>
  </div>
  <div class="label">
    <img src="data:image/png;base64,{{ img_b64 }}" alt="Label">
  </div>
</body>
</html>
