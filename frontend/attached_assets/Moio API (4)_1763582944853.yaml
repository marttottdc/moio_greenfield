components:
  schemas:
    AgentConfiguration:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        enabled:
          type: boolean
        name:
          type: string
          nullable: true
          maxLength: 255
        model:
          type: string
          maxLength: 80
        instructions:
          type: string
          nullable: true
        channel:
          nullable: true
          description: |-
            Select the integration channel for this agent

            * `whatsapp` - WhatsApp
            * `email` - Email
            * `webhook` - Webhook
          oneOf:
          - $ref: '#/components/schemas/AgentConfigurationChannelEnum'
          - $ref: '#/components/schemas/NullEnum'
        channel_id:
          type: string
          nullable: true
          maxLength: 80
        tools:
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - updated_at
    AgentConfigurationChannelEnum:
      enum:
      - whatsapp
      - email
      - webhook
      type: string
      description: |-
        * `whatsapp` - WhatsApp
        * `email` - Email
        * `webhook` - Webhook
    Audience:
      type: object
      description: Lightweight audience representation for listings.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        kind:
          allOf:
          - $ref: '#/components/schemas/Kind193Enum'
          readOnly: true
        size:
          type: integer
          readOnly: true
        is_draft:
          type: boolean
          readOnly: true
        materialized_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created:
          type: string
          format: date-time
          readOnly: true
        updated:
          type: string
          format: date-time
          readOnly: true
      required:
      - created
      - description
      - id
      - is_draft
      - kind
      - materialized_at
      - name
      - size
      - updated
    AudienceDetail:
      type: object
      description: Full representation including rule definition.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        kind:
          allOf:
          - $ref: '#/components/schemas/Kind193Enum'
          readOnly: true
        size:
          type: integer
          readOnly: true
        is_draft:
          type: boolean
          readOnly: true
        materialized_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created:
          type: string
          format: date-time
          readOnly: true
        updated:
          type: string
          format: date-time
          readOnly: true
        rules:
          nullable: true
      required:
      - created
      - description
      - id
      - is_draft
      - kind
      - materialized_at
      - name
      - rules
      - size
      - updated
    AuthTypeEnum:
      enum:
      - none
      - bearer
      - basic
      - hmac
      - header
      - query
      - jwt
      type: string
      description: |-
        * `none` - No auth
        * `bearer` - Bearer / header token
        * `basic` - HTTP Basic user+pass
        * `hmac` - HMAC-SHA256 signature
        * `header` - Static value in named header
        * `query` - Static value in ?token=…
        * `jwt` - JWT signed with HS256 / RS256
    Campaign:
      type: object
      description: Campaign list serializer with derived insights.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
