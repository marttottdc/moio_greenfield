# Copiar a values-secrets.yaml (o preprod-secrets.yaml / prod-secrets.yaml)
# y completar con valores reales. NO commitear los archivos *-secrets.yaml.
#
# Uso:
#   helm upgrade --install moio-greenfield-stack ./infra/charts/moio-greenfield-stack \
#     -f infra/environments/preprod.yaml \
#     -f infra/environments/values-secrets.yaml \
#     -n moio-greenfield --create-namespace ...

# --- Config (ConfigMap): URLs de servicios externos ---
config:
  # Postgres: usar URL de PgBouncer en prod (puerto 6432) o Postgres directo (5432)
  database_url: "postgres://USER:PASSWORD@HOST:6432/DATABASE"
  redis_url: "redis://HOST:6379/0"
  app_name: "moio_greenfield"

# --- Secrets (Kubernetes Secret): claves sensibles ---
secrets:
  # Django SECRET_KEY (generar con: openssl rand -base64 48)
  secret_key: ""
  # Otros env vars secretos que necesite la app (opcional)
  other_secret: ""

# Opcional: imagen y pullSecret si usas registry privado
# image:
#   repository: ghcr.io/your-org/moio-greenfield-backend
#   pullSecret: registry-4
