# Copiar a values-secrets.yaml (o preprod-secrets.yaml / prod-secrets.yaml)
# y completar con valores reales. NO commitear los archivos *-secrets.yaml.
#
# Uso:
#   helm upgrade --install moio-greenfield-stack ./infra/charts/moio-greenfield-stack \
#     -f infra/environments/preprod.yaml \
#     -f infra/environments/values-secrets.yaml \
#     -n moio-greenfield --create-namespace ...

# --- Config (ConfigMap): solo valores no sensibles ---
config:
  app_name: "moio_greenfield"

# --- Existing Secret: `moio-greenfield-secrets` ---
# Crear este Secret fuera de Helm y no dejar que el chart lo sobrescriba.
# Claves esperadas:
#   SECRET_KEY
#   DB_HOST
#   DB_PORT
#   DB_NAME
#   DB_USER
#   DB_PASSWORD
#   REDIS_HOST
#   REDIS_PORT
#   REDIS_DB
#   REDIS_PASSWORD        # opcional
#   REDIS_USERNAME        # opcional
#   REDIS_SCHEME          # opcional, default `redis`
#   PGBOUNCER_BACKEND_HOST      # solo si pgbouncer.enabled=true
#   PGBOUNCER_BACKEND_PORT      # opcional, default 5432
#   PGBOUNCER_BACKEND_DBNAME    # solo si pgbouncer.enabled=true
#   PGBOUNCER_AUTH_USER         # solo si pgbouncer.enabled=true
#   PGBOUNCER_AUTH_PASSWORD     # solo si pgbouncer.enabled=true
#   PGBOUNCER_POOL_MODE         # opcional
#   PGBOUNCER_MAX_CLIENT_CONN   # opcional
#   PGBOUNCER_DEFAULT_POOL_SIZE # opcional
#   PGBOUNCER_MIN_POOL_SIZE     # opcional
#   PGBOUNCER_SERVER_LIFETIME   # opcional
#   PGBOUNCER_SERVER_IDLE_TIMEOUT # opcional

# Opcional: imagen y pullSecret si usas registry privado
# image:
#   repository: ghcr.io/your-org/moio-greenfield-backend
#   pullSecret: registry-4
