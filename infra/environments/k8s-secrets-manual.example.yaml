# Crear ConfigMap y Secret a mano (sustituir placeholders y aplicar).
# Namespace debe existir: kubectl create namespace moio-greenfield
#
# Opción A: aplicar este archivo después de editar (no commitear):
#   kubectl apply -f infra/environments/k8s-secrets-manual.yaml
#
# Opción B: crear desde línea de comandos (ver más abajo).

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: moio-greenfield-config
  namespace: moio-greenfield
data:
  DATABASE_URL: "postgres://USER:PASSWORD@HOST:6432/DATABASE"
  REDIS_URL: "redis://HOST:6379/0"
  APP_NAME: "moio_greenfield"
---
apiVersion: v1
kind: Secret
metadata:
  name: moio-greenfield-secrets
  namespace: moio-greenfield
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_openssl_rand_base64_48"
  OTHER_SECRET: ""

# ========== COMANDOS PARA CREAR DESDE LÍNEA DE COMANDOS ==========
#
# 1. Namespace (si no existe):
#    kubectl create namespace moio-greenfield
#
# 2. ConfigMap (sustituir las URLs):
#    kubectl create configmap moio-greenfield-config -n moio-greenfield \
#      --from-literal=DATABASE_URL='postgres://USER:PASSWORD@HOST:6432/DATABASE' \
#      --from-literal=REDIS_URL='redis://HOST:6379/0' \
#      --from-literal=APP_NAME='moio_greenfield'
#
# 3. Secret (sustituir SECRET_KEY; OTHER_SECRET es opcional):
#    kubectl create secret generic moio-greenfield-secrets -n moio-greenfield \
#      --from-literal=SECRET_KEY="$(openssl rand -base64 48)" \
#      --from-literal=OTHER_SECRET=''
#
# 4. Si ya existen y quieres actualizarlos, borrar y recrear o usar apply con el YAML editado:
#    kubectl delete configmap moio-greenfield-config -n moio-greenfield
#    kubectl delete secret moio-greenfield-secrets -n moio-greenfield
#    # luego crear de nuevo con los comandos de arriba
