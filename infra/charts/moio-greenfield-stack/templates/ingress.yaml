{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-http
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /ws
            pathType: Prefix
            backend:
              service:
                {{- if .Values.pushpin.enabled }}
                name: pushpin-service
                port:
                  number: {{ .Values.pushpin.servicePort }}
                {{- else }}
                name: backend
                port:
                  number: {{ .Values.backend.servicePort }}
                {{- end }}
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: {{ .Values.backend.servicePort }}
{{- end }}
