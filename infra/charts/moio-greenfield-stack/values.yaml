# Default values. Override in environments/*.yaml or via -f.
# Database, Redis and PgBouncer are EXTERNAL - set connection URLs here.

image:
  repository: ghcr.io/your-org/moio-greenfield-backend
  tag: latest
  pullSecret: ghcr-secret

backend:
  replicas: 1
  servicePort: 80
  containerPort: 8010

workers:
  high:
    replicas: 1
    concurrency: 10
  medium:
    replicas: 1
    concurrency: 2
  low:
    replicas: 1
    concurrency: 2
  flows:
    replicas: 1
    concurrency: 2

scheduler:
  replicas: 1

ingress:
  enabled: true
  host: api.moio-greenfield.example.com
  tlsSecret: api-moio-greenfield-tls

# External services - no DB/Redis/PgBouncer inside the chart
config:
  # Use PgBouncer URL for connection pooling (recommended in prod)
  database_url: postgres://user:password@pgbouncer-host:6432/moio_greenfield
  redis_url: redis://redis-host:6379/0
  app_name: moio_greenfield

secrets:
  secret_key: ""
  # Add other secret env vars as needed
  other_secret: ""
