# Default values. Override in environments/*.yaml or via -f.
# Database, Redis and PgBouncer are EXTERNAL - set connection URLs here.
#
# Migrations: The backend pod runs "manage.py migrate --noinput" in an init container
# before the app starts. New migration files must be created locally (makemigrations)
# and committed; deploy only applies existing migrations.

image:
  repository: ghcr.io/your-org/moio-greenfield-backend
  tag: latest
  pullSecret: ghcr-secret

backend:
  replicas: 1
  servicePort: 80
  containerPort: 8010

workers:
  high:
    replicas: 1
    concurrency: 10
  medium:
    replicas: 1
    concurrency: 2
  low:
    replicas: 1
    concurrency: 2
  flows:
    replicas: 1
    concurrency: 2

scheduler:
  replicas: 1

ingress:
  enabled: true
  host: moio.ai
  # Certificados autogestionados por cert-manager (cluster-issuer). Para subdominios por tenant:
  wildcardHost: ""   # ej. "*.moio.ai" → peticiones a stressalpha.moio.ai, etc.
  tlsSecret: moio-ai-tls
  # Si wildcardHost está definido: mismo secret (Certificate con ambos dnsNames) o uno solo para wildcard:
  # wildcardTlsSecret: ""  # si está vacío se usa tlsSecret para el wildcard también

# Pushpin: reverse proxy for HTTP + WebSockets (like moio_platform)
# When enabled, ingress backend paths point to pushpin-service; Pushpin forwards to backend.
pushpin:
  enabled: true
  replicas: 1
  image:
    repository: fanout/pushpin
    tag: latest
    pullPolicy: IfNotPresent
  # Pushpin listens on 80; routes file forwards to backend
  servicePort: 80

# Non-sensitive app config only. Put DB/Redis/PgBouncer connection values in
# the existing `moio-greenfield-secrets` Secret instead.
config:
  app_env: prod
  app_name: moio_greenfield

# Optional in-cluster PgBouncer (connects to external Postgres)
pgbouncer:
  enabled: false
  replicas: 1
  image:
    repository: edoburu/pgbouncer
    tag: latest
    pullPolicy: IfNotPresent
secrets:
  create: false
