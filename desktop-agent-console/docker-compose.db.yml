services:
  moio-postgres:
    image: postgres:16-alpine
    container_name: moio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moio}
      POSTGRES_USER: ${POSTGRES_USER:-moio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moio}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - moio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moio} -d ${POSTGRES_DB:-moio}"]
      interval: 5s
      timeout: 5s
      retries: 20

  moio-redis:
    image: redis:7-alpine
    container_name: moio-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6389}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - moio_redis_data:/data

volumes:
  moio_postgres_data:
  moio_redis_data:
