# Build backend image and deploy stack to preprod (on push to main)
name: Build Backend & Deploy to Preprod

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.save_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: |
            IMAGE_TAG=build-${{ github.run_number }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-${{ github.run_number }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tag
        id: save_tag
        run: echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT

  deploy-preprod:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config

      - name: Deploy stack to Preprod
        run: |
          helm upgrade --install moio-greenfield-stack ./infra/charts/moio-greenfield-stack \
            -f ./infra/environments/preprod.yaml \
            --namespace moio-greenfield \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }} \
            --set image.tag=${{ needs.build-and-push-backend.outputs.image_tag }}
