# Build backend image and deploy stack to preprod (on push to main)
name: Build Backend & Deploy to Preprod

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/build-backend-deploy-preprod.yml"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg15-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/moio_test
          DJANGO_SETTINGS_MODULE: moio_platform.settings
          USE_RLS_TENANCY: "1"
          SECRET_KEY: test-secret
          CELERY_TASK_ALWAYS_EAGER: "1"
        run: |
          python manage.py migrate --noinput
          python manage.py test moio_platform.tests.test_smoke_endpoints -v 2

  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: smoke-tests
    outputs:
      image_tag: ${{ steps.save_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: |
            IMAGE_TAG=build-${{ github.run_number }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build-${{ github.run_number }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tag
        id: save_tag
        run: echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT

  deploy-preprod:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Set up kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          mkdir -p $HOME/.kube
          python3 << 'PYEOF'
          import os, base64, sys
          data = os.environ.get("KUBECONFIG_DATA", "")
          if not data:
              print("::error::KUBECONFIG_DATA secret is empty")
              sys.exit(1)
          out = data
          try:
              decoded = base64.b64decode(data).decode("utf-8")
              if "apiVersion" in decoded and "kind" in decoded:
                  out = decoded
          except Exception:
              pass
          out = out.replace("\r\n", "\n").replace("\r", "\n")
          path = os.path.expanduser("~/.kube/config")
          with open(path, "w") as f:
              f.write(out)
          os.chmod(path, 0o600)
          PYEOF

      - name: Deploy stack to Preprod
        run: |
          helm upgrade --install moio-greenfield-stack ./infra/charts/moio-greenfield-stack \
            -f ./infra/environments/preprod.yaml \
            --namespace moio-greenfield \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }} \
            --set image.tag=${{ needs.build-and-push-backend.outputs.image_tag }}
